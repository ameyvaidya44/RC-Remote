name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build_and_release:
    name: Build & Release Custom App
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.3'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK platforms
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "platforms;android-36"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (arm64-v8a)
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/RC-Remote-${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/RC-Remote-${{ github.event.inputs.version }}.apk

